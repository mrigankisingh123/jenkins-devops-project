<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins CI/CD Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #87CEEB, #00BFFF);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            color: #333;
            padding: 20px;
            margin: auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #00BFFF;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #009ACD;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>☁️ Jenkins CI/CD</h1>
        <h2>Sky Blue Deployment 🌤️</h2>

        <div class="card">
            <h3>🚀 Pipeline Status</h3>
            <p>Successfully deployed using GitHub + Jenkins</p>
            <a href="#" class="btn">Learn More</a>
        </div>
    </div>
</body>
</html>
